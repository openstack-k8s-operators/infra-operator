#
# Step 3: Delete the RabbitMq cluster while dependent resources still exist.
# Then delete the dependent resources. All should clean up gracefully.
#
apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
- script: |
    set -e
    # Delete dependent resources first (proper order)
    oc delete rabbitmqpolicy del-deps-policy -n $NAMESPACE --ignore-not-found
    oc delete rabbitmquser del-deps-user -n $NAMESPACE --ignore-not-found
    oc delete transporturl del-deps-url -n $NAMESPACE --ignore-not-found
    oc delete rabbitmqvhost del-deps-vhost -n $NAMESPACE --ignore-not-found

    # Now delete the cluster
    oc delete rabbitmq.rabbitmq.openstack.org rabbitmq-del-deps -n $NAMESPACE --ignore-not-found
    oc delete pvc -n $NAMESPACE -l app.kubernetes.io/name=rabbitmq-del-deps --ignore-not-found
    for pv in $(oc get pv -o jsonpath='{range .items[?(@.spec.claimRef.namespace=="'$NAMESPACE'")]}{.metadata.name}{" "}{.spec.claimRef.name}{"\n"}{end}' | grep rabbitmq-del-deps | awk '{print $1}'); do
      oc delete pv "$pv" --ignore-not-found
    done
