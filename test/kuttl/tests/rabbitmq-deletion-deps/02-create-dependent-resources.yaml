#
# Step 2: Create user, policy, and TransportURL (vhost must already exist)
#
apiVersion: rabbitmq.openstack.org/v1beta1
kind: RabbitMQUser
metadata:
  name: del-deps-user
spec:
  rabbitmqClusterName: rabbitmq-del-deps
  vhostRef: del-deps-vhost
  username: deluser
  permissions:
    configure: ".*"
    write: ".*"
    read: ".*"
---
apiVersion: rabbitmq.openstack.org/v1beta1
kind: RabbitMQPolicy
metadata:
  name: del-deps-policy
spec:
  rabbitmqClusterName: rabbitmq-del-deps
  vhostRef: del-deps-vhost
  pattern: ".*"
  definition:
    max-length: 1000
---
apiVersion: rabbitmq.openstack.org/v1beta1
kind: TransportURL
metadata:
  name: del-deps-url
spec:
  rabbitmqClusterName: rabbitmq-del-deps
  username: del-deps-svc
