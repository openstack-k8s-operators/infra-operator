#
# Step 1: Assert vhost is ready
#
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 120
commands:
  - script: |
      set -e
      READY=$(oc get -n $NAMESPACE rabbitmqvhost/del-deps-vhost -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}')
      if [ "$READY" != "True" ]; then
        echo "FAIL: rabbitmqvhost/del-deps-vhost not ready"
        oc get -n $NAMESPACE rabbitmqvhost/del-deps-vhost -o yaml
        exit 1
      fi
      echo "PASS: rabbitmqvhost/del-deps-vhost is ready"
